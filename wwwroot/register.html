<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konto użytkownika</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f6f8;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            max-width: 1000px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 42px;
            font-weight: 700;
            color: #ff5a00;
            text-decoration: none;
        }

        .back-btn {
            text-decoration: none;
            color: #ff5a00;
            border: 2px solid #ff5a00;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: .2s;
        }

            .back-btn:hover {
                background: #fff0e8;
            }

        .auth-card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,.08);
            max-width: 480px;
            margin: 0 auto;
        }

            .auth-card h3 {
                color: #ff5a00;
                margin-bottom: 25px;
                font-size: 32px;
            }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
        }

            input:focus {
                outline: none;
                border-color: #ff5a00;
            }

        button {
            width: 100%;
            border: none;
            background: #ff5a00;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: .2s;
            margin-bottom: 10px;
        }

            button:hover {
                background: #e85000;
            }

        .gray-btn {
            background: #f3f4f6;
            color: #333;
        }

            .gray-btn:hover {
                background: #e5e7eb;
            }

        .danger-btn {
            background: #dc3545;
        }

            .danger-btn:hover {
                background: #bb2d3b;
            }

        .switch-link {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }

            .switch-link a {
                color: #ff5a00;
                text-decoration: none;
                font-weight: 600;
            }

                .switch-link a:hover {
                    text-decoration: underline;
                }

        #profileForm {
            display: none;
            max-width: 480px;
            margin: 0 auto;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,.08);
        }

            #profileForm h3 {
                color: #ff5a00;
                margin-bottom: 20px;
                font-size: 32px;
            }

        .small-info {
            color: #666;
            margin-bottom: 20px;
        }

        .message {
            max-width: 480px;
            margin: 20px auto;
            padding: 15px;
            border-radius: 12px;
            background: #e7f5ff;
        }
    </style>
</head>

<body>

    <div class="header">
        <a href="index.html" class="logo">allegro</a>
        <a href="index.html" class="back-btn">← Powrót do aukcji</a>
    </div>

    <div id="message" class="message">Zaloguj się lub załóż konto.</div>

    <!-- Logowanie -->
    <div id="loginCard" class="auth-card">
        <h3>Zaloguj się</h3>
        <input id="loginIdentifier" placeholder="Email lub nazwa użytkownika">
        <div style="position:relative;">
            <input id="loginPassword" placeholder="Hasło" type="password" style="margin-bottom:15px;">
            <span onclick="togglePassword('loginPassword', this)" style="position:absolute; right:14px; top:14px; cursor:pointer; color:#999;">👁️</span>
        </div>
        <button onclick="loginUser()">Zaloguj</button>
        <div class="switch-link">
            Nie masz konta? <a href="#" onclick="showRegister()">Załóż je tutaj</a>
        </div>
    </div>

    <!-- Rejestracja (ukryta domyślnie) -->
    <div id="registerCard" class="auth-card" style="display:none;">
        <h3>Załóż konto</h3>
        <input id="registerUsername" placeholder="Nazwa użytkownika">
        <input id="registerEmail" placeholder="Email" type="email">
        <div style="position:relative;">
            <input id="registerPassword" placeholder="Hasło" type="password" style="margin-bottom:15px;">
            <span onclick="togglePassword('registerPassword', this)" style="position:absolute; right:14px; top:14px; cursor:pointer; color:#999;">👁️</span>
        </div>
        <input id="registerFirstName" placeholder="Imię">
        <input id="registerLastName" placeholder="Nazwisko">
        <button onclick="registerUser()">Załóż konto</button>
        <div class="switch-link">
            Masz już konto? <a href="#" onclick="showLogin()">Zaloguj się</a>
        </div>
    </div>

    <!-- Profil (ukryty domyślnie) -->
    <div id="profileForm">
        <h3>Mój profil</h3>
        <p class="small-info">Zarządzanie kontem użytkownika.</p>
        <input id="profileId" disabled placeholder="ID użytkownika">
        <input id="profileUsername" placeholder="Nazwa użytkownika">
        <input id="profileEmail" placeholder="Email">
        <input id="profileFirstName" placeholder="Imię">
        <input id="profileLastName" placeholder="Nazwisko">
        <button onclick="updateProfile()">Zapisz zmiany</button>
        <button class="danger-btn" onclick="deleteMyAccount()">Usuń konto</button>
        <div class="switch-link" style="margin-top:15px;">
            <a href="#" onclick="logoutUser()">Wyloguj się</a>
        </div>
    </div>

    <script>

        const apiUrl = window.location.origin;

        function showMessage(text) {
            document.getElementById("message").innerText = text;
        }

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.style.color = "#ff5a00";
            } else {
                input.type = "password";
                icon.style.color = "#999";
            }
        }

        function getToken() {
            return localStorage.getItem("token");
        }

        function showLogin() {
            document.getElementById("loginCard").style.display = "block";
            document.getElementById("registerCard").style.display = "none";
            document.getElementById("profileForm").style.display = "none";
        }

        function showRegister() {
            document.getElementById("loginCard").style.display = "none";
            document.getElementById("registerCard").style.display = "block";
            document.getElementById("profileForm").style.display = "none";
        }

        function showProfile(user) {
            document.getElementById("loginCard").style.display = "none";
            document.getElementById("registerCard").style.display = "none";
            document.getElementById("profileForm").style.display = "block";
            document.getElementById("profileId").value = user.id;
            document.getElementById("profileUsername").value = user.username;
            document.getElementById("profileEmail").value = user.email;
            document.getElementById("profileFirstName").value = user.firstName;
            document.getElementById("profileLastName").value = user.lastName;
        }

        async function registerUser() {
            const user = {
                username: document.getElementById("registerUsername").value,
                email: document.getElementById("registerEmail").value,
                password: document.getElementById("registerPassword").value,
                firstName: document.getElementById("registerFirstName").value,
                lastName: document.getElementById("registerLastName").value
            };

            const response = await fetch(`${apiUrl}/users/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(user)
            });

            if (response.ok) {
                showMessage("Konto zostało utworzone. Zaloguj się.");
                showLogin();
            } else {
                const error = await response.json();
                showMessage(error.message || "Błąd rejestracji.");
            }
        }

        async function loginUser() {
            const identifier = document.getElementById("loginIdentifier").value;
            const password = document.getElementById("loginPassword").value;

            const response = await fetch(`${apiUrl}/users/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: identifier, password: password })
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem("token", data.token);
                localStorage.setItem("loggedUserId", data.user.id);
                localStorage.setItem("currentUser", JSON.stringify(data.user));
                showMessage(`Zalogowano jako ${data.user.username}`);
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
            } else {
                const error = await response.json();
                showMessage(error.message || "Błąd logowania.");
            }
        }

        function logoutUser() {
            localStorage.removeItem("loggedUserId");
            localStorage.removeItem("currentUser");
            localStorage.removeItem("token");
            showMessage("Wylogowano.");
            showLogin();
        }

        async function updateProfile() {
            const user = JSON.parse(localStorage.getItem("currentUser"));
            if (!user) { showMessage("Nie jesteś zalogowany."); return; }

            const updated = {
                username: document.getElementById("profileUsername").value,
                email: document.getElementById("profileEmail").value,
                firstName: document.getElementById("profileFirstName").value,
                lastName: document.getElementById("profileLastName").value
            };

            const response = await fetch(`${apiUrl}/users/${user.id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${getToken()}`
                },
                body: JSON.stringify(updated)
            });

            if (response.ok) {
                const updatedUser = { ...user, ...updated };
                localStorage.setItem("currentUser", JSON.stringify(updatedUser));
                showMessage("Dane zostały zaktualizowane.");
                showProfile(updatedUser);
            } else {
                const error = await response.json();
                showMessage(error.message || "Błąd aktualizacji.");
            }
        }

        async function deleteMyAccount() {
            const user = JSON.parse(localStorage.getItem("currentUser"));
            if (!user) { showMessage("Nie jesteś zalogowany."); return; }
            if (!confirm("Czy na pewno chcesz usunąć konto? Tej operacji nie można cofnąć.")) return;

            const response = await fetch(`${apiUrl}/users/${user.id}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${getToken()}` }
            });

            if (response.ok) {
                logoutUser();
                showMessage("Konto zostało usunięte.");
            } else {
                showMessage("Błąd usuwania konta.");
            }
        }

        // sprawdz czy zalogowany przy wejsciu na strone
        const storedUser = localStorage.getItem("currentUser");
        if (storedUser) {
            showProfile(JSON.parse(storedUser));
            showMessage(`Zalogowano jako ${JSON.parse(storedUser).username}`);
        } else {
            showLogin();
        }

    </script>

</body>
</html>
