<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wystaw przedmiot</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f6f8;
        }

        .header {
            background: white;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, .08);
        }

        .logo {
            color: #ff5a00;
            font-size: 42px;
            font-weight: 700;
            text-decoration: none;
        }

        .back-btn {
            text-decoration: none;
            color: #ff5a00;
            font-weight: 600;
            transition: .2s;
        }

        .back-btn:hover {
            font-size: 24px;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .08);
        }

        h1 {
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            background: #ff5a00;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .submit-btn:hover {
            background: #e85000;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #eef7ff;
        }
    </style>
</head>

<body>

    <header class="header">
        <a href="index.html" class="logo">allegro</a>

        <a href="index.html" class="back-btn">
            ← Powrót do aukcji
        </a>
    </header>

    <div class="container">

        <div class="card">

            <h1>Wystaw przedmiot</h1>

            <div class="form-group">
                <input id="auctionTitle" placeholder="Tytuł aukcji">
            </div>

            <div class="form-group">
                <textarea id="auctionDescription" placeholder="Opisz dokładnie swój przedmiot"></textarea>
            </div>

            <div class="form-group">
                <input id="auctionCategory" placeholder="Kategoria">
            </div>

            <div class="form-group">
                <input id="auctionStartingPrice" type="number" placeholder="Cena wywoławcza">
            </div>

            <div class="form-group">
                <input id="auctionStartDate" type="datetime-local">
            </div>

            <div class="form-group">
                <input id="auctionEndDate" type="datetime-local">
            </div>

            <div class="form-group">
                <input id="auctionOwnerId" type="number" placeholder="ID właściciela">
            </div>

            <button class="submit-btn" onclick="createAuction()">
                Wystaw aukcję
            </button>

            <div id="message" class="message">
                Wypełnij formularz i wystaw przedmiot.
            </div>

        </div>

    </div>

    <script>

        const apiUrl = window.location.origin;

        function showMessage(text) {
            document.getElementById("message").innerText = text;
        }

        async function createAuction() {

            const auction = {

                title:
                    document.getElementById("auctionTitle").value,

                description:
                    document.getElementById("auctionDescription").value,

                category:
                    document.getElementById("auctionCategory").value,

                startingPrice:
                    Number(document.getElementById("auctionStartingPrice").value),

                startDate:
                    new Date(
                        document.getElementById("auctionStartDate").value
                    ).toISOString(),

                endDate:
                    new Date(
                        document.getElementById("auctionEndDate").value
                    ).toISOString(),

                ownerId:
                    Number(document.getElementById("auctionOwnerId").value)
            };

            const response = await fetch(`${apiUrl}/auctions`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(auction)
            });

            if (response.ok) {

                showMessage("Aukcja została dodana.");

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1500);

            } else {

                const error = await response.json();

                showMessage(
                    error.message ||
                    "Błąd dodawania aukcji."
                );
            }
        }

    </script>

</body>

</html>
