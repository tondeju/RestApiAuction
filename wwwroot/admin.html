<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Panel administratora</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f6f8;
            margin: 0;
        }

        .header {
            background: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
        }

        .logo {
            font-size: 36px;
            color: #ff5a00;
            font-weight: 700;
        }

        .back-btn {
            text-decoration: none;
            color: #ff5a00;
            border: 2px solid #ff5a00;
            padding: 10px 18px;
            border-radius: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .08);
        }

        h1 {
            margin-top: 0;
            color: #ff5a00;
        }

        button {
            background: #ff5a00;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th {
            background: #fff2ea;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <div class="header">

        <div class="logo">
            REST-API Admin
        </div>

        <a href="index.html" class="back-btn">
            ← Powrót
        </a>

    </div>

    <div class="container">

        <div class="card">

            <h1>Panel administratora</h1>

            <p>
                Zarządzanie użytkownikami systemu.
            </p>

            <button onclick="loadUsers()">
                Odśwież użytkowników
            </button>

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Imię</th>
                        <th>Nazwisko</th>
                    </tr>
                </thead>

                <tbody id="usersTable">
                </tbody>

            </table>

        </div>

    </div>

    <script>

        const apiUrl = window.location.origin;

        async function loadUsers() {

            const response =
                await fetch(`${apiUrl}/users`);

            const users =
                await response.json();

            const table =
                document.getElementById("usersTable");

            table.innerHTML = "";

            users.forEach(user => {

                table.innerHTML += `
        <tr>
            <td>${user.id}</td>
            <td>${user.username}</td>
            <td>${user.email}</td>
            <td>${user.firstName}</td>
            <td>${user.lastName}</td>
        </tr>
        `;
            });
        }

        loadUsers();

    </script>

</body>

</html>
